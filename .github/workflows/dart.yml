name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed "architecture: x64" so it defaults to ARM64 on modern macOS runners

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: pod install # Changed from "pod repo update" to actually install the pods
        working-directory: ios

      - name: Build iOS App Bundle
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag_name: v1.0 # Fixed: 'tag' is not a valid parameter for this action, use 'tag_name'
          overwrite: true
          body: "This is first release"
